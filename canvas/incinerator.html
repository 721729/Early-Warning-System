<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>绿电哨兵 - 焚烧炉设备健康度监测平台</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:#0f1923;color:#e0e0e0;display:flex;height:100vh;overflow:hidden}
/* 左侧设备树 */
.sidebar{width:240px;background:#1a2a3a;padding:16px;overflow-y:auto;border-right:1px solid #2a3a4a}
.sidebar h2{font-size:16px;color:#4fc3f7;margin-bottom:16px}
.device-group{margin-bottom:12px}
.device-group .label{font-size:12px;color:#78909c;margin-bottom:4px}
.device-item{padding:8px 12px;margin:2px 0;border-radius:4px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px;transition:background .2s}
.device-item:hover{background:#253548}
.device-item .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot.green{background:#4caf50;box-shadow:0 0 6px #4caf50}
.dot.yellow{background:#ffeb3b;box-shadow:0 0 6px #ffeb3b}
.dot.orange{background:#ff9800;box-shadow:0 0 6px #ff9800;animation:pulse 1.5s infinite}
.dot.red{background:#f44336;box-shadow:0 0 8px #f44336;animation:pulse .8s infinite}
@keyframes pulse{50%{opacity:.5}}
.device-item.active{background:#1e4a6b;border-left:3px solid #4fc3f7}
/* 中间主区域 */
.main{flex:1;display:flex;flex-direction:column;padding:20px;overflow-y:auto}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.header h1{font-size:22px;color:#fff}
.header .user{font-size:13px;color:#78909c}
.boiler-container{position:relative;width:100%;height:280px;background:#1a2a3a;border-radius:8px;margin-bottom:16px}
#boiler-chart{width:100%;height:100%}
.bottom-panels{display:grid;grid-template-columns:1fr 1fr;gap:16px;flex:1}
.panel{background:#1a2a3a;border-radius:8px;padding:16px}
.panel h3{font-size:14px;color:#4fc3f7;margin-bottom:12px}
#trend-chart,#alert-panel{width:100%;height:100%}
/* 预警弹窗 */
.alert-item{background:#253548;padding:12px;margin-bottom:8px;border-radius:6px;border-left:4px solid #ff9800}
.alert-item.red{border-left-color:#f44336}
.alert-item .time{font-size:11px;color:#78909c}
.alert-item .reason{font-size:13px;margin:6px 0}
.alert-item .loss{font-size:12px;color:#ff9800}
.alert-item .actions{margin-top:8px;display:flex;gap:8px}
.btn{padding:6px 14px;border:none;border-radius:4px;cursor:pointer;font-size:12px}
.btn-primary{background:#1976d2;color:#fff}
.btn-warning{background:#f57c00;color:#fff}
.btn-danger{background:#d32f2f;color:#fff}
/* Toast */
.toast{position:fixed;top:20px;right:20px;background:#ff9800;color:#fff;padding:12px 20px;border-radius:6px;z-index:999;animation:slideIn .3s;display:none}
.toast.show{display:block}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
</style>
</head>
<body>

<!-- 左侧设备树 -->
<div class="sidebar">
  <h2>⚙️ 新沂项目 #1炉</h2>
  <div class="device-group">
    <div class="label">▸ 受热面</div>
    <div class="device-item active" data-device="1"><span class="dot orange"></span>高温过热器 入口段</div>
    <div class="device-item" data-device="2"><span class="dot yellow"></span>高温过热器 出口段</div>
    <div class="device-item" data-device="3"><span class="dot green"></span>中温过热器</div>
    <div class="device-item" data-device="4"><span class="dot green"></span>低温过热器</div>
    <div class="device-item" data-device="5"><span class="dot green"></span>省煤器</div>
  </div>
  <div class="device-group">
    <div class="label">▸ 辅机</div>
    <div class="device-item" data-device="6"><span class="dot green"></span>引风机</div>
    <div class="device-item" data-device="7"><span class="dot green"></span>给水泵</div>
    <div class="device-item" data-device="8"><span class="dot green"></span>炉排液压站</div>
  </div>
</div>

<!-- 主区域 -->
<div class="main">
  <div class="header">
    <h1>焚烧炉设备健康度监测平台</h1>
    <div class="user">👤 张工 (值长) · 2026-07-14 08:15</div>
  </div>

  <!-- 焚烧炉剖面图 -->
  <div class="boiler-container"><div id="boiler-chart"></div></div>

  <!-- 底部面板 -->
  <div class="bottom-panels">
    <div class="panel">
      <h3>📈 高温过热器入口段 — 壁厚衰减趋势</h3>
      <div id="trend-chart"></div>
    </div>
    <div class="panel">
      <h3>⚠️ 实时预警</h3>
      <div id="alert-panel">
        <div class="alert-item" id="alert-1">
          <div class="time">2026-07-14 08:15 · 橙色预警</div>
          <div class="reason">HCl浓度连续48小时超出正常基线30%，当前腐蚀速率0.35mm/年（正常0.15mm/年），预测高温过热器入口段第1排剩余寿命45天</div>
          <div class="loss">💰 预估潜在损失: ¥420,000</div>
          <div class="actions">
            <button class="btn btn-primary" onclick="confirmAlert()">确认</button>
            <button class="btn btn-warning" onclick="showAdvice()">查看运维建议</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ======================== 焚烧炉剖面图 ========================
(function(){
  var c = echarts.init(document.getElementById('boiler-chart'));
  // 用矩形堆叠模拟焚烧炉受热面布局
  c.setOption({
    backgroundColor: '#1a2a3a',
    grid: {left:80,right:40,top:20,bottom:20},
    xAxis: {type:'value',min:0,max:10,show:false},
    yAxis: {type:'value',min:0,max:15,show:false},
    series: [
      // 炉膛
      {type:'bar',data:[{value:[1,14],name:'炉膛',itemStyle:{color:'#37474f'}}],
       barWidth:'60%',label:{show:true,position:'inside',formatter:'炉  膛',fontSize:14,color:'#78909c'}},
      // 蒸发器
      {type:'bar',data:[{value:[3,12],name:'蒸发器',itemStyle:{color:'#2e7d32'}}],
       barWidth:'15%',label:{show:true,position:'inside',formatter:'蒸发器',fontSize:10}},
      // 高温过热器(入口)
      {type:'bar',data:[{value:[5.5,12],name:'高过入口',itemStyle:{color:'#ff9800'}}],
       barWidth:'10%',label:{show:true,position:'inside',formatter:'高过\n入口',fontSize:9}},
      // 高温过热器(出口)
      {type:'bar',data:[{value:[6.5,12],name:'高过出口',itemStyle:{color:'#ffeb3b'}}],
       barWidth:'10%',label:{show:true,position:'inside',formatter:'高过\n出口',fontSize:9}},
      // 中温过热器
      {type:'bar',data:[{value:[7.5,12],name:'中过',itemStyle:{color:'#4caf50'}}],
       barWidth:'10%',label:{show:true,position:'inside',formatter:'中温\n过热器',fontSize:9}},
      // 低温过热器
      {type:'bar',data:[{value:[8.5,12],name:'低过',itemStyle:{color:'#4caf50'}}],
       barWidth:'10%',label:{show:true,position:'inside',formatter:'低温\n过热器',fontSize:9}},
      // 省煤器
      {type:'bar',data:[{value:[9.5,12],name:'省煤器',itemStyle:{color:'#4caf50'}}],
       barWidth:'10%',label:{show:true,position:'inside',formatter:'省煤器',fontSize:9}},
    ]
  });
  // 点击柱子 → 联动下钻
  c.on('click', function(p){ if(p.dataIndex!==undefined) selectDevice(p.dataIndex+1); });
})();

// ======================== 壁厚趋势图 ========================
(function(){
  var c = echarts.init(document.getElementById('trend-chart'));
  var days = [], wall=[], upper=[], lower=[], v=5.1;
  for(var i=0;i<180;i++){ days.push(i+1); wall.push(v); upper.push(v+0.15); lower.push(v-0.1); v-=0.35/365; }
  c.setOption({
    backgroundColor:'#1a2a3a',
    tooltip:{trigger:'axis'},
    legend:{data:['壁厚预测','上界','下界','危险阈值'],textStyle:{color:'#78909c'},top:5},
    xAxis:{type:'category',data:days,name:'运行天数',nameTextStyle:{color:'#78909c'},axisLabel:{color:'#78909c'}},
    yAxis:{type:'value',name:'壁厚(mm)',min:0,max:6.5,axisLabel:{color:'#78909c'}},
    series:[
      {name:'壁厚预测',type:'line',data:wall,smooth:true,lineStyle:{color:'#ff9800',width:2},symbol:'none'},
      {name:'上界',type:'line',data:upper,smooth:true,lineStyle:{color:'#81c784',type:'dashed'},symbol:'none'},
      {name:'下界',type:'line',data:lower,smooth:true,lineStyle:{color:'#81c784',type:'dashed'},symbol:'none'},
      {name:'危险阈值',type:'line',markLine:{silent:true,lineStyle:{color:'#f44336',type:'dotted'},data:[{yAxis:3.0,label:{formatter:'3.0mm\n最小允许',color:'#f44336'}}]},symbol:'none',data:[]}
    ]
  });
})();

// ======================== 交互 ========================
function selectDevice(id){
  document.querySelectorAll('.device-item').forEach(function(el){ el.classList.remove('active'); });
  var el = document.querySelector('[data-device="'+id+'"]');
  if(el) el.classList.add('active');
}

function confirmAlert(){
  document.getElementById('alert-1').style.opacity = '0.5';
  showToast('预警已确认, 已通知检修班长');
}

function showAdvice(){
  showToast('运维建议: 建议7天内安排停炉, 检查高温过热器入口段第1-3排管子, 备件清单已推送至工单系统');
}

function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 4000);
}

// 模拟: 每30秒橙色预警脉冲一次
setTimeout(function(){
  var a = document.getElementById('alert-1');
  if(a) a.style.borderLeftColor = '#f44336';
}, 30000);
</script>
</body>
</html>
