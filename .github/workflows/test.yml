name: tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy "fastapi[standard]" sqlalchemy pymysql "python-jose[cryptography]" "passlib[bcrypt]" redis pydantic pydantic-settings httpx pytest

      - name: Run tests
        run: python -m pytest -q
