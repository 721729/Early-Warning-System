version: "3.8"

services:
  influxdb:
    image: influxdb:2.7
    container_name: gps-influxdb
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=sensor_data
      - INFLUXDB_ADMIN_USER=${INFLUX_USER:-admin}
      - INFLUXDB_ADMIN_PASSWORD=${INFLUX_PASS:-admin123}
      - INFLUXDB_HTTP_AUTH_ENABLED=true
    volumes:
      - influxdb_data:/var/lib/influxdb2
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: gps-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASS:-root123}
      - MYSQL_DATABASE=green_power_sentinel
      - MYSQL_USER=${MYSQL_USER:-gps_user}
      - MYSQL_PASSWORD=${MYSQL_PASS:-gps_pass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: gps-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASS:-redis123}
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  influxdb_data:
  mysql_data:
  redis_data:
